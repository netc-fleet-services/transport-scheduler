# ═══════════════════════════════════════════════
# TowBook → Supabase Scheduled Calls Sync
#
# Runs every 15 minutes. Scrapes the TowBook dispatch page
# with Playwright and upserts/deletes jobs in Supabase.
#
# Required repository secrets (Settings → Secrets → Actions):
#   TOWBOOK_USER        — TowBook login username
#   TOWBOOK_PASS        — TowBook login password
#   SUPABASE_URL        — from Supabase Dashboard → Settings → API
#   SUPABASE_SERVICE_KEY — service role key (bypasses RLS) — NOT the anon key
#   GEOCODIO_KEY        — from geocod.io dashboard (optional — improves address quality)
# ═══════════════════════════════════════════════

name: Sync TowBook Calls

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # allow manual runs from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # kill if TowBook login hangs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Cache the Playwright browser binary so we don't re-download Chromium
      # on every run (saves ~30s and reduces bandwidth).
      # System deps (apt packages) are always installed via --with-deps regardless
      # of cache state — splitting into two steps caused apt-get hangs on cache hits.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browsers and system deps
        run: python -m playwright install chromium --with-deps

      - name: Run sync
        env:
          TOWBOOK_USER:        ${{ secrets.TOWBOOK_USER }}
          TOWBOOK_PASS:        ${{ secrets.TOWBOOK_PASS }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEOCODIO_KEY:        ${{ secrets.GEOCODIO_KEY }}
        run: python scripts/sync_calls.py
