<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NETC Transport Planner</title>

  <!-- React & Babel (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <!-- Supabase client (CDN) — exposes window.supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- App logic (plain JS, no JSX — loaded before the React components) -->
  <script src="js/config.js"></script>          <!-- yards, drivers, colors, style objects        -->
  <script src="js/geo.js"></script>             <!-- ZIP data, geocoding, distance math            -->
  <script src="js/utils.js"></script>           <!-- persistence, date helpers, job time calc      -->
  <script src="js/supabase-config.js"></script> <!-- Supabase URL + anon key (gitignored)          -->
  <script src="js/supabase.js"></script>        <!-- Supabase client (window.sb) + auth helpers    -->
  <script src="js/db.js"></script>              <!-- all database reads/writes (window.db)         -->
</head>
<body>
  <div id="root"></div>

  <!-- React components — Babel compiles JSX at runtime -->
  <script type="text/babel" src="js/app.js"></script>
</body>
</html>
